version: "3"

# Keep in sync with .github/workflows/ci.yaml (YAEGI_VERSION).
vars:
  YAEGI_VERSION: v0.14.2

tasks:
  default:
    silent: true
    cmds:
      - task --list

  help:
    silent: true
    cmds:
      - task --list

  test:
    desc: Run Go tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run linter
    cmds:
      - |
        docker run --rm -v $(pwd):/app -w /app golangci/golangci-lint:latest golangci-lint run ./...

  test:coverage:
    desc: Run Go tests with coverage
    cmds:
      - go test ./... -coverprofile=coverage.out -covermode=atomic
      - go tool cover -func=coverage.out

  docker:up:
    desc: Start Traefik and whoami
    cmds:
      - docker compose up -d

  docker:restart:
    desc: Restart Traefik to reload plugin code and dynamic config
    cmds:
      - docker compose up -d --force-recreate traefik

  docker:down:
    desc: Stop containers
    cmds:
      - docker compose down

  act:lint:
    desc: Run ci workflow locally with act
    env:
      ACTRC: .actrc
    cmds:
      - act -W .github/workflows/ci.yaml

  act:test:
    desc: Run go-cross workflow locally with act
    env:
      ACTRC: .actrc
    cmds:
      - act -W .github/workflows/go-cross.yaml

  act:
    desc: Run all workflows locally with act
    env:
      ACTRC: .actrc
    cmds:
      - act

  changelog:
    desc: Generate CHANGELOG.md
    cmds:
      - ./scripts/changelog.sh

  changelog:preview:
    desc: Preview CHANGELOG.md
    cmds:
      - ./scripts/changelog.sh --dry-run

  hooks:install:
    desc: Install git hooks
    cmds:
      - chmod +x hooks/pre-commit
      - ln -sf "$(pwd)/hooks/pre-commit" .git/hooks/pre-commit

  yaegi:install:
    desc: Install Yaegi {{.YAEGI_VERSION}} into $(go env GOPATH)/bin
    cmds:
      - curl -sfL https://raw.githubusercontent.com/traefik/yaegi/master/install.sh | bash -s -- -b $(go env GOPATH)/bin {{.YAEGI_VERSION}}

  yaegi:test:
    desc: Run tests with Yaegi
    cmds:
      - |
        YAEGI_BIN="$(go env GOPATH)/bin/yaegi"
        YAEGI_GOPATH="$(pwd)/.yaegi"
        MODULE_PATH="github.com/lucho00cuba/headers-enricher"
        MODULE_DIR="$YAEGI_GOPATH/src/$MODULE_PATH"

        mkdir -p "$(dirname "$MODULE_DIR")"
        ln -snf "$(pwd)" "$MODULE_DIR"

        HOSTNAME="test-host" \
        NODE_NAME="worker-01" \
        ALLOWED_VAR="visible" \
        SECRET_VAR="hidden" \
        GOPATH="$YAEGI_GOPATH" "$YAEGI_BIN" test -tags yaegi -v "$MODULE_PATH"
